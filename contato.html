<!DOCTYPE html>
 <html lang="pt-br"> <head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Perfil de Super-Herói | Recrutamento</title>
     <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="container-cabecalho">
        <div class = cabecalho-inner>
            <a href="index.html" class = "logo-link">
                <img src="imagens/codificador.jpg  " alt="Logo do programador" title="Codificador Mascarado" width="750">
            </a>
            <div class="cabecalho-texto">
                <h4></h4>
                <span class="cabecalho-label">Bem vindo ao</span>
                <h1 class="cabecalho-titulo">Codificador Mascarado</h1>
                <p>Especialistas em resolver bugs e derrubar servidores vilões.</p>
            </div>
        </div>        
    </header> 

         <div class="container-navegacao">        
                <a href="index.html" class="btn-primary">Sobre mim</a>
                <a href="habilidades.html" class="btn-secondary">Habilidades</a>
                <a href="missao.html" class="btn-tertiary">Missão</a>
                <a href="contato.html" class="btn-quaternary">Contato</a>
        </div>
        <section class="container-contato">
            <h2>Contrate o Herói</h2>
            <article class="servico">
                <img src="imagens/contato.jpg" alt="Fale com o Herói" class="icone" width="750">
                <div class="servico-info">
                    <h3>Super-Herói Disponível</h3>
                    <p>Estou pronto para enfrentar qualquer desafio de programação!</p>
                </div>
            </article> <br>

            <form action="#">
                <label for="nome">Seu Nome:</label><br>
                <input type="text" id="nome" name="nome" placeholder="Ex: Comissário Gordon" required>
                <br><br>
                <label for="email">Seu E-mail:</label><br>
                <input type="email" id="email" name="email" placeholder="Ex: comissario.gordon@policiacivil.pr.gov.br" required>
                <br><br>
                <label for="missao-txt">Descrição da Missão:</label><br>
                <textarea id="missao-txt" rows="4" cols="30"></textarea>
                <br><br>

                <button type="submit">Enviar Sinal de Ajuda ⚡</button>
            </form>
        </section>
    <footer>
        <p>&copy; 2026 - Desenvolvido na base secreta de TI.</p>
    </footer>

</body>
</html>
